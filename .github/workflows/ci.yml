name: CI

on:
  push:
    branches:
      - main
      - feature/lab5
  workflow_dispatch:

jobs:
  build-and-push:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'ci:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - events
          - payments
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive image owner
        id: image-meta
        run: |
          owner=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./app/${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ steps.image-meta.outputs.owner }}/quickticket-${{ matrix.service }}:${{ github.sha }}

  update-manifests:
    if: github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'ci:')
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Derive image owner
        id: image-meta
        run: |
          owner=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Update image tags in manifests
        run: |
          sha="${{ github.sha }}"
          owner="${{ steps.image-meta.outputs.owner }}"
          sed -i -E "s|image: .*gateway:[^[:space:]]+|image: ghcr.io/${owner}/quickticket-gateway:${sha}|" k8s/gateway.yaml
          sed -i -E "s|image: .*events:[^[:space:]]+|image: ghcr.io/${owner}/quickticket-events:${sha}|" k8s/events.yaml
          sed -i -E "s|image: .*payments:[^[:space:]]+|image: ghcr.io/${owner}/quickticket-payments:${sha}|" k8s/payments.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/gateway.yaml k8s/events.yaml k8s/payments.yaml
          git diff --cached --quiet && exit 0
          git commit -m "ci: update image tags to ${{ github.sha }}"
          git push origin HEAD:${{ github.ref_name }}
