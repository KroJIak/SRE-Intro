name: CI

on:
  push:
    branches:
      - main
      - feature/lab5
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - events
          - payments
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive image owner
        id: image-meta
        run: |
          owner=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./app/${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ steps.image-meta.outputs.owner }}/quickticket-${{ matrix.service }}:${{ github.sha }}
