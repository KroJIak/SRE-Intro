apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gateway
  labels:
    app: gateway
    version: "v2"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: gateway
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 20
        - pause:
            duration: 20s
        - analysis:
            templates:
              - templateName: gateway-error-rate
            args:
              - name: canary-hash
                valueFrom:
                  podTemplateHashValue: Latest
        - setWeight: 40
        - pause:
            duration: 20s
        - setWeight: 60
        - pause:
            duration: 20s
        - setWeight: 80
        - pause:
            duration: 20s
        - setWeight: 100
  template:
    metadata:
      labels:
        app: gateway
        version: "v2"
    spec:
      terminationGracePeriodSeconds: 40
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gateway
      containers:
        - name: gateway
          image: ghcr.io/krojiak/quickticket-gateway:1a50f138a67883a5c092fadcb45ecdb28c1945cb
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: EVENTS_URL
              value: "http://events:8081"
            - name: PAYMENTS_URL
              value: "http://payments:8082"
            - name: NOTIFICATIONS_URL
              value: "http://notifications:8083"
            - name: GATEWAY_TIMEOUT_MS
              value: "7000"
            - name: RETRY_MAX
              value: "3"
            - name: RETRY_BASE_DELAY_MS
              value: "100"
            - name: CB_FAILURE_THRESHOLD
              value: "5"
            - name: CB_COOLDOWN_S
              value: "30"
            - name: RATE_LIMIT_RPS
              value: "10"
            - name: BULKHEAD_PAYMENTS_MAX
              value: "10"
            - name: BULKHEAD_PAYMENTS_TIMEOUT_S
              value: "0.5"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 2
            failureThreshold: 1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
